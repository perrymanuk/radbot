name: Dev Deploy

on:
  issue_comment:
    types: [created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  dev-deploy:
    # Only run on PR comments that start with /dev-deploy
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/dev-deploy')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Add rocket reaction to trigger comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);
            core.setOutput('number', context.issue.number);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev-pr-${{ steps.pr.outputs.number }}
            type=sha,prefix=dev-sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger homelab dev deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMELAB_DISPATCH_TOKEN }}
          repository: perrymanuk/hashi-homelab
          event-type: update-radbot-dev
          client-payload: '{"tag": "dev-pr-${{ steps.pr.outputs.number }}", "pr": "${{ steps.pr.outputs.number }}", "ref": "${{ steps.pr.outputs.ref }}", "sha": "${{ steps.pr.outputs.sha }}"}'

      - name: Comment deployment status
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          body: |
            **Dev deployment triggered**

            - **Image:** `ghcr.io/perrymanuk/radbot:dev-pr-${{ steps.pr.outputs.number }}`
            - **Branch:** `${{ steps.pr.outputs.ref }}`
            - **Commit:** `${{ steps.pr.outputs.sha }}`

            The dev instance will be available shortly.

      - name: Comment on failure
        if: failure()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          body: |
            **Dev deployment failed**

            Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
